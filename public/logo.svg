<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#111111"/>

  <g transform="translate(256, 235)">
    <!-- Top face (circuit board) -->
    <path d="M-130,-160 L130,-180 L155,85 L-105,105 Z"
          stroke="white" stroke-width="14" stroke-linejoin="round" fill="none"/>

    <!-- Grid vertical divider -->
    <line x1="12" y1="-170" x2="25" y2="95" stroke="white" stroke-width="11"/>
    <!-- Grid horizontal divider -->
    <line x1="-118" y1="-28" x2="143" y2="-48" stroke="white" stroke-width="11"/>

    <!-- Circuit traces — top-left: T-connector -->
    <path d="M-85,-95 L-45,-97" stroke="white" stroke-width="10" stroke-linecap="square" fill="none"/>
    <path d="M-65,-97 L-65,-62" stroke="white" stroke-width="10" stroke-linecap="square" fill="none"/>

    <!-- Circuit traces — top-right: L-connector down -->
    <path d="M85,-115 L85,-72" stroke="white" stroke-width="10" stroke-linecap="square" fill="none"/>
    <path d="M85,-72 L55,-70" stroke="white" stroke-width="10" stroke-linecap="square" fill="none"/>

    <!-- Circuit traces — bottom-left: stub up -->
    <path d="M-70,8 L-70,52" stroke="white" stroke-width="10" stroke-linecap="square" fill="none"/>
    <path d="M-70,30 L-38,28" stroke="white" stroke-width="10" stroke-linecap="square" fill="none"/>

    <!-- Circuit traces — bottom-right: T-connector -->
    <path d="M65,20 L65,62" stroke="white" stroke-width="10" stroke-linecap="square" fill="none"/>
    <path d="M45,42 L90,38" stroke="white" stroke-width="10" stroke-linecap="square" fill="none"/>

    <!-- 3D depth — bottom face -->
    <path d="M-105,105 L155,85 L142,150 L-118,170 Z" fill="white"/>
    <!-- 3D depth — left face -->
    <path d="M-130,-160 L-105,105 L-118,170 L-143,-95 Z" fill="white"/>
  </g>
</svg>
